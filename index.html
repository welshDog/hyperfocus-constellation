<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperfocus Zone - Constellation Map</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Emergency CSS Variables */
        :root {
            --font-family-base: 'Inter', 'Segoe UI', sans-serif;
            --color-text: #f5f5f5;
            --color-teal-300: #32b8c6;
            --space-8: 8px;
            --space-12: 12px;
            --space-16: 16px;
            --space-20: 20px;
            --font-size-sm: 12px;
            --font-size-2xl: 20px;
        }
        
        /* Debug styles */
        .debug-info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px;
            z-index: 1000;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Debug Info -->
    <div class="debug-info" id="debugInfo">
        Loading constellation...
    </div>
    
    <!-- Background Canvas -->
    <canvas id="backgroundCanvas"></canvas>
    
    <!-- Main Container -->
    <div class="constellation-container">
        <!-- Header Controls -->
        <div class="header-controls">
            <div class="logo-section">
                <h1 class="constellation-title">🌌 Hyperfocus Zone</h1>
                <p class="constellation-subtitle">Interactive Constellation Map</p>
            </div>
            
            <div class="controls-section">
                <input type="text" 
                       id="searchInput" 
                       class="search-input form-control" 
                       placeholder="Search repos...">
                
                <div class="filter-buttons" id="filterButtons">
                    <button class="btn btn--sm filter-btn active" data-category="all">All (24)</button>
                </div>        </div>
        
        <!-- Info Panel -->
        <div class="info-panel hidden" id="infoPanel">
            <div class="info-panel-header">
                <h3 class="info-title" id="infoTitle"></h3>
                <button class="close-btn" id="closePanelBtn">✕</button>
            </div>
            
            <div class="info-panel-body">
                <div class="repo-category" id="repoCategory"></div>
                <div class="repo-status" id="repoStatus"></div>
                
                <p class="repo-description" id="repoDescription"></p>
                
                <div class="features-section">
                    <h4>Key Features:</h4>
                    <ul class="features-list" id="featuresList"></ul>
                </div>
                
                <div class="connections-section" id="connectionsSection">
                    <h4>Connected To:</h4>
                    <div class="connections-list" id="connectionsList"></div>
                </div>
                
                <div class="panel-actions">
                    <a class="btn btn--primary" id="githubLink" target="_blank">
                        🌟 Explore on GitHub
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Mini Map -->
        <div class="mini-map" id="miniMap">
            <div class="mini-map-title">Navigation</div>
            <div class="mini-map-viewport" id="miniMapViewport"></div>
        </div>
        
        <!-- Legend -->
        <div class="legend">
            <div class="legend-title">Categories</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-color core-color"></div>
                    <span>Core</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color creative-color"></div>
                    <span>Creative</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color social-color"></div>
                    <span>Social</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color dev-color"></div>
                    <span>Dev Tools</span>
                </div>
            </div>
        </div>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
