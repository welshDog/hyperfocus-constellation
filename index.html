<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperfocus Zone - Constellation Map</title>
<style>
/* … your existing CSS unchanged … */
</style>
</head>
<body>

<!-- LEFT SIDE: Story Panel -->
<div class="story-sidebar">
  <!-- … unchanged … -->
</div>

<!-- RIGHT SIDE: Sponsor Boxes -->
<div class="sponsor-sidebar">
  <!-- … unchanged … -->
</div>

<!-- Screen reader announcements -->
<div aria-live="polite" id="search-announcer" class="sr-only"></div>
<div aria-live="assertive" id="action-announcer" class="sr-only"></div>
<div aria-live="polite" id="filter-announcer" class="sr-only"></div>

<!-- Background Canvas -->
<canvas id="backgroundCanvas"></canvas>

<main role="main" aria-labelledby="constellation-title">
  <div class="constellation-container">
    
    <!-- Header Controls … unchanged … -->
    <div class="controls-section">
    <!-- ADD THIS SEARCH INPUT -->
    <div class="search-container">
        <label for="searchInput" class="sr-only">Search repositories</label>
        <input type="text" 
               id="searchInput" 
               class="search-input" 
               placeholder="Search repositories..."
               aria-label="Search across 24 repositories">
    </div>
      
    <!-- ADD THESE FILTER BUTTONS -->
    <div class="filter-buttons">
        <button class="filter-btn active" data-category="all">All (24)</button>
        <button class="filter-btn" data-category="Core Empire">Core</button>
        <button class="filter-btn" data-category="Creative">Creative</button>
        <button class="filter-btn" data-category="Social">Social</button>
        <button class="filter-btn" data-category="Dev Tools">Dev</button>
    </div>
    <!-- ADD THIS PORTAL MODE BUTTON -->
    <button class="btn portal-btn" id="portalModeBtn">
        🌀 Portal Mode
    </button>
</div> <!-- Close controls-section -->

    <div class="constellation-viewport" id="constellationViewport"></div>
  </div>
</main>

<!-- Zoom Slider -->
<div id="zoom-slider-container" aria-label="Zoom control">
  <label for="zoom-slider">🔍 Zoom</label>
  <input type="range" id="zoom-slider" min="50" max="200" value="100" step="10"
         aria-label="Zoom constellation from 50% to 200%">
  <span id="zoom-value">100%</span>
</div>

<script>
console.log('🌌 Hyperfocus Zone - Starting...');

const repositories = [ /* … unchanged array … */ ];

class ConstellationMap {
  constructor() {
    this.repositories = repositories;
    this.currentFilter = 'all';
    this.init();
  }

  //   Zoom Slider Connection
setupZoomControls() {
    const zoomSlider = document.getElementById('zoomSlider');
    
    if (zoomSlider) {
        zoomSlider.addEventListener('input', (e) => {
            const zoomValue = parseFloat(e.target.value) / 100;
            this.setZoom(zoomValue);
        });
    }
}

//   Actual Zoom Function  
setZoom(scale) {
    if (this.group) {
        const svgRect = this.svg.getBoundingClientRect();
        const centerX = svgRect.width / 2;
        const centerY = svgRect.height / 2;
        
        const transform = `translate(${centerX}, ${centerY}) scale(${scale}) translate(${-centerX}, ${-centerY})`;
        this.group.setAttribute('transform', transform);
    }
}

  init() {
    this.createBackgroundStars();
    this.createSVG();
    this.drawRepositories();
    this.bindEvents();
  }

  createBackgroundStars() {
    const canvas = document.getElementById('backgroundCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    for (let i = 0; i < 50; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const radius = Math.random() * 2;
      const opacity = Math.random() * 0.8 + 0.2;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
      ctx.fill();
    }
  }

  createSVG() {
    const viewport = document.getElementById('constellationViewport');
    viewport.innerHTML = '';
    this.svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    this.svg.setAttribute('class', 'constellation-svg');
    this.svg.setAttribute('viewBox', '0 0 900 600');
    this.group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    this.svg.appendChild(this.group);
    viewport.appendChild(this.svg);
  }

  .star-node {
    transition: transform 0.2s ease;
    will-change: transform;
}

.star-node:hover {
    transform: scale(1.3);
}

  drawRepositories() {
    this.group.innerHTML = '';
    this.repositories.forEach((repo) => {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', repo.x);
      circle.setAttribute('cy', repo.y);
      circle.setAttribute('r', repo.size);
      circle.setAttribute('fill', repo.color);
      circle.setAttribute('stroke', '#fff');
      circle.setAttribute('stroke-width', '2');
      circle.setAttribute('class', 'star-node');
      circle.setAttribute('tabindex', '0');
      circle.setAttribute('role', 'button');
      circle.setAttribute('aria-label',
        `${repo.name} repository in ${repo.category}. Press Enter to open.`);

      circle.addEventListener('mouseenter', (e) => {
    circle.style.transform = 'scale(1.3)';
    circle.style.transformOrigin = 'center';
});

circle.addEventListener('mouseleave', () => {
    circle.style.transform = 'scale(1)';
});
      circle.addEventListener('click', () => window.open(repo.githubUrl, '_blank'));
      circle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          window.open(repo.githubUrl, '_blank');
        }
      });
      this.group.appendChild(circle);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', repo.x);
      text.setAttribute('y', repo.y + repo.size + 15);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', '#fff');
      text.setAttribute('font-size', '10');
      text.style.pointerEvents = 'none';
      text.textContent = repo.name.length > 12 ?
          repo.name.substring(0, 12) + '...' : repo.name;
      this.group.appendChild(text);
    });
  }

  showTooltip(event, repo) {
    let tooltip = document.getElementById('tooltip');
    if (!tooltip) {
      tooltip = document.createElement('div');
      tooltip.id = 'tooltip';
      tooltip.className = 'tooltip';
      document.body.appendChild(tooltip);
    }
    tooltip.innerHTML = `<strong>${repo.name}</strong><br>
                         <em>${repo.category}</em><br>
                         <small>${repo.description}</small>`;
    tooltip.style.left = event.pageX + 10 + 'px';
    tooltip.style.top = event.pageY - 10 + 'px';
    tooltip.classList.add('visible');
  }

  hideTooltip() {
    const tooltip = document.getElementById('tooltip');
    if (tooltip) tooltip.classList.remove('visible');
  }

  bindEvents() {
    console.log('🔗 Binding events...');
    
    // SAFE SEARCH INPUT BINDING
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            this.handleSearch(e.target.value);
        });
        console.log('✅ Search input bound');
    } else {
        console.warn('❌ searchInput element not found');
    }
    
    // SAFE FILTER BUTTONS BINDING  
    const filterButtons = document.querySelectorAll('.filter-btn');
    if (filterButtons.length > 0) {
        filterButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Remove active class from all buttons
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                this.currentFilter = e.target.dataset.category;
                this.applyFilters();
            });
        });
        console.log(`✅ ${filterButtons.length} filter buttons bound`);
    } else {
        console.warn('❌ No filter buttons found');
    }
    
    // SAFE PORTAL MODE BUTTON BINDING
    const portalModeBtn = document.getElementById('portalModeBtn');
    if (portalModeBtn) {
        portalModeBtn.addEventListener('click', () => {
            this.svg.style.animation = this.svg.style.animation ? '' : 'rotate 30s linear infinite';
        });
        console.log('✅ Portal mode button bound');
    } else {
        console.warn('❌ portalModeBtn element not found');
    }
    
    console.log('🎉 Event binding complete!');
}

  applyFilters() {
    this.group.querySelectorAll('.star-node').forEach((circle, index) => {
      const repo = this.repositories[index];
      if (this.currentFilter === 'all' || repo.category === this.currentFilter) {
        circle.style.opacity = '1';
        circle.style.pointerEvents = 'auto';
      } else {
        circle.style.opacity = '0.2';
        circle.style.pointerEvents = 'none';
      }
    });
  }

  handleSearch(query) {
    this.group.querySelectorAll('.star-node').forEach((circle, index) => {
      const repo = this.repositories[index];
      const matches = repo.name.toLowerCase().includes(query.toLowerCase()) ||
                      repo.description.toLowerCase().includes(query.toLowerCase()) ||
                      repo.category.toLowerCase().includes(query.toLowerCase());
      circle.style.opacity = (query === '' || matches) ? '1' : '0.2';
      circle.style.pointerEvents = (query === '' || matches) ? 'auto' : 'none';
      this.setupZoomControls();
    });
  }
}

// Rotate animation style
const style = document.createElement('style');
style.textContent = `@keyframes rotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}`;
document.head.appendChild(style);

// Init
document.addEventListener('DOMContentLoaded', () => new ConstellationMap());

// Zoom slider
setTimeout(() => {
  const zoomSlider = document.getElementById('zoom-slider');
  const zoomValue  = document.getElementById('zoom-value');
  const target     = document.querySelector('svg');
  if (zoomSlider && zoomValue && target) {
    zoomSlider.addEventListener('input', (e) => {
      const percent = e.target.value;
      const scale   = percent / 100;
      zoomValue.textContent = percent + '%';
      target.style.transform = `scale(${scale})`;
      target.style.transformOrigin = 'center center';
    });
  }
}, 1000);
</script>

</body>
</html>
